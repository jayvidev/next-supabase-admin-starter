# Project ref must be set via `supabase link --project-ref <ref>` (writes to .temp).
project_id = "landing-admin-starter"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/admin"]
jwt_expiry = 3600
enable_signup = false  # admin-only; create users from Studio or CLI

[auth.email]
enable_signup = false
enable_confirmations = false
